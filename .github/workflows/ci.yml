name: CI

on:
  push:
    branches:
      - main
      - "fix/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: cad_photo_to_dxf

    steps:
      - name: Check out exact commit
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: cad_photo_to_dxf/requirements*.txt

      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest ruff

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run static checks
        run: python -m ruff check app tests main.py

      - name: Compile Python sources
        run: python -m compileall -q app tests main.py
