name: Windows build and smoke test

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "cad_photo_to_dxf/**"
      - ".github/workflows/windows-build.yml"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: cad_photo_to_dxf

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            cad_photo_to_dxf/requirements.txt
            cad_photo_to_dxf/requirements-dev.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Resolve application version
        id: version
        shell: pwsh
        run: |
          $version = (python -c "from app import __version__; print(__version__)").Trim()
          if (-not $version) { throw "Application version is empty" }
          "value=$version" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Run regression tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Build portable application
        shell: pwsh
        run: pyinstaller --noconfirm --clean cad_photo_to_dxf.spec

      - name: Smoke test portable application
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          ./scripts/windows_smoke.ps1 `
            -Executable ./dist/CADPhotoToDXF/CADPhotoToDXF.exe `
            -Sample ./samples/test.jpg `
            -WorkingDirectory "$env:RUNNER_TEMP/cad-photo-portable-smoke"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: '& "C:/Program Files (x86)/Inno Setup 6/ISCC.exe" ./installer/cad_photo_to_dxf.iss'

      - name: Install, launch, and uninstall smoke test
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          ./scripts/installer_smoke.ps1 `
            -Installer "./installer/output/CADPhotoToDXF-${{ steps.version.outputs.value }}-Setup.exe" `
            -Sample ./samples/test.jpg `
            -WorkingDirectory "$env:RUNNER_TEMP/cad-photo-installer-smoke"

      - uses: actions/upload-artifact@v4
        with:
          name: CADPhotoToDXF-Windows-v${{ steps.version.outputs.value }}
          if-no-files-found: error
          retention-days: 14
          path: |
            cad_photo_to_dxf/dist/CADPhotoToDXF/**
            cad_photo_to_dxf/installer/output/CADPhotoToDXF-${{ steps.version.outputs.value }}-Setup.exe
