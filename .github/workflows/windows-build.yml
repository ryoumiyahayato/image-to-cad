name: Windows build and smoke test

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "cad_photo_to_dxf/**"
      - ".github/workflows/windows-build.yml"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: cad_photo_to_dxf

    steps:
      - name: Check out exact commit
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: cad_photo_to_dxf/requirements*.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Read canonical application version
        shell: pwsh
        run: |
          $version = (python -c "from app import __version__; print(__version__)").Trim()
          if (-not $version) { throw "Application version is empty" }
          "VERSION=$version" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run regression and static checks
        shell: pwsh
        run: |
          python -m pytest -q
          python -m ruff check app tests validation main.py
          python -m mypy app/resolution.py app/scale_calibrator.py app/reporting.py app/auxiliary_recognition.py
          python -m compileall -q app tests validation main.py

      - name: Build portable application
        shell: pwsh
        run: pyinstaller --noconfirm --clean cad_photo_to_dxf.spec

      - name: Smoke test portable application
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          ./scripts/windows_smoke.ps1 `
            -Executable ./dist/CADPhotoToDXF/CADPhotoToDXF.exe `
            -Sample ./samples/test.jpg `
            -WorkingDirectory "$env:RUNNER_TEMP/cad-photo-portable-smoke"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer from canonical version
        shell: pwsh
        run: |
          & "C:/Program Files (x86)/Inno Setup 6/ISCC.exe" `
            "/DMyAppVersion=$env:VERSION" `
            ./installer/cad_photo_to_dxf.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup build failed" }

      - name: Install, launch, and uninstall smoke test
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          ./scripts/installer_smoke.ps1 `
            -Installer "./installer/output/CADPhotoToDXF-$env:VERSION-Setup.exe" `
            -Sample ./samples/test.jpg `
            -WorkingDirectory "$env:RUNNER_TEMP/cad-photo-installer-smoke"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CADPhotoToDXF-Windows-${{ env.VERSION }}
          if-no-files-found: error
          path: |
            cad_photo_to_dxf/dist/CADPhotoToDXF/**
            cad_photo_to_dxf/installer/output/CADPhotoToDXF-${{ env.VERSION }}-Setup.exe
