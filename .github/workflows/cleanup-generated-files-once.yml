name: One-time generated-file index cleanup

on:
  push:
    branches:
      - fix/audit-remediation
    paths:
      - .github/workflows/cleanup-generated-files-once.yml

permissions:
  contents: write

jobs:
  cleanup:
    if: github.ref_name == 'fix/audit-remediation'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out remediation branch
        uses: actions/checkout@v4
        with:
          ref: fix/audit-remediation
          fetch-depth: 0

      - name: Remove tracked generated files from the current index
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import PurePosixPath
          import subprocess

          tracked = subprocess.check_output(
              ["git", "ls-files", "-z"],
          ).decode("utf-8", errors="surrogateescape").split("\0")

          generated_components = {"build", "dist", "__pycache__", ".agents"}
          generated_suffixes = {".pyc", ".pyo"}
          explicit_prefixes = (
              "cad_photo_to_dxf/installer/output/",
              "cad_photo_to_dxf/output/",
              "output/",
          )
          root_generated_suffixes = {".dxf", ".png"}

          def should_remove(path: str) -> bool:
              if not path:
                  return False
              pure = PurePosixPath(path)
              parts = set(pure.parts)
              if parts & generated_components:
                  return True
              if pure.suffix.lower() in generated_suffixes:
                  return True
              if path.startswith(explicit_prefixes):
                  return True
              if len(pure.parts) == 1 and pure.suffix.lower() in root_generated_suffixes:
                  return True
              return False

          targets = sorted(path for path in tracked if should_remove(path))
          print(f"Removing {len(targets)} tracked generated files")
          if len(targets) < 100:
              raise SystemExit(
                  "Safety stop: expected at least 100 tracked generated files; "
                  f"found {len(targets)}"
              )
          for start in range(0, len(targets), 100):
              subprocess.run(
                  ["git", "rm", "-r", "--cached", "--ignore-unmatch", "--", *targets[start:start + 100]],
                  check=True,
              )
          PY

      - name: Delete this one-time workflow from the resulting commit
        run: git rm .github/workflows/cleanup-generated-files-once.yml

      - name: Commit and push the index cleanup
        shell: bash
        run: |
          if git diff --cached --quiet; then
            echo "No generated files were removed"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove tracked generated files"
          git push origin HEAD:fix/audit-remediation
