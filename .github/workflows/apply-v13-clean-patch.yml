name: Apply verified v1.3 patch

on:
  push:
    branches:
      - fix/multipage-visual-review-v13-clean
    paths:
      - ".automation/ready"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/multipage-visual-review-v13-clean
          fetch-depth: 0
      - name: Verify, apply, test syntax, and commit
        shell: bash
        run: |
          set -euo pipefail
          cat .automation/chunk-* | tr -d '\r\n' | base64 --decode > "$RUNNER_TEMP/v13.patch"
          expected="5607e015aaef328ba492c7925b238c18d4fe48ea39d1129498e888981ed56776"
          actual="$(sha256sum "$RUNNER_TEMP/v13.patch" | awk '{print $1}')"
          test "$actual" = "$expected"
          git apply --check "$RUNNER_TEMP/v13.patch"
          git apply "$RUNNER_TEMP/v13.patch"
          rm -rf .automation .github/workflows/apply-v13-clean-patch.yml
          python -m compileall -q cad_photo_to_dxf/app cad_photo_to_dxf/tests cad_photo_to_dxf/validation cad_photo_to_dxf/scripts cad_photo_to_dxf/main.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add multi-page scan fidelity and visual review"
          git push origin HEAD:fix/multipage-visual-review-v13-clean
