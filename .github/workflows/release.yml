name: Release Windows package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to release, for example v1.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 120
    environment: release
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout exact tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            cad_photo_to_dxf/requirements.txt
            cad_photo_to_dxf/requirements-dev.txt

      - name: Verify immutable tag and application version
        id: version
        shell: pwsh
        working-directory: cad_photo_to_dxf
        run: |
          $ErrorActionPreference = "Stop"
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must use vMAJOR.MINOR.PATCH"
          }
          git fetch --tags --force
          git rev-parse --verify "refs/tags/$env:RELEASE_TAG" | Out-Null
          $tagCommit = (git rev-list -n 1 $env:RELEASE_TAG).Trim()
          $headCommit = (git rev-parse HEAD).Trim()
          if ($tagCommit -ne $headCommit) {
            throw "Checked out commit $headCommit does not match tag commit $tagCommit"
          }
          $version = (python -c "from app import __version__; print(__version__)").Trim()
          if ($env:RELEASE_TAG -ne "v$version") {
            throw "Tag $env:RELEASE_TAG does not match application version v$version"
          }
          "value=$version" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "commit=$headCommit" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Refuse to overwrite an existing Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Continue"
          $encodedTag = [Uri]::EscapeDataString($env:RELEASE_TAG)
          $response = gh api `
            -H "Accept: application/vnd.github+json" `
            "/repos/$env:GITHUB_REPOSITORY/releases/tags/$encodedTag" 2>&1
          $status = $LASTEXITCODE
          if ($status -eq 0) {
            throw "Release $env:RELEASE_TAG already exists; refusing to overwrite it"
          }
          if (($response | Out-String) -notmatch 'HTTP 404|Not Found') {
            throw "Unable to verify whether the Release exists: $response"
          }
          $global:LASTEXITCODE = 0

      - name: Install dependencies
        shell: pwsh
        working-directory: cad_photo_to_dxf
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install "pytest>=8,<9" "ruff>=0.9,<1"

      - name: Run source validation
        shell: pwsh
        working-directory: cad_photo_to_dxf
        run: |
          python -m pytest -q
          python -m compileall -q app scripts main.py
          python -m ruff check .

      - name: Build portable application
        shell: pwsh
        working-directory: cad_photo_to_dxf
        run: pyinstaller --noconfirm --clean cad_photo_to_dxf.spec

      - name: Smoke test portable application
        shell: pwsh
        working-directory: cad_photo_to_dxf
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          ./scripts/windows_smoke.ps1 `
            -Executable ./dist/CADPhotoToDXF/CADPhotoToDXF.exe `
            -Sample ./samples/test.jpg `
            -WorkingDirectory "$env:RUNNER_TEMP/cad-photo-release-smoke"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        working-directory: cad_photo_to_dxf
        run: |
          & "C:/Program Files (x86)/Inno Setup 6/ISCC.exe" `
            "/DMyAppVersion=${{ steps.version.outputs.value }}" `
            "./installer/cad_photo_to_dxf.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup build failed" }

      - name: Install, launch, and uninstall smoke test
        shell: pwsh
        working-directory: cad_photo_to_dxf
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          ./scripts/installer_smoke.ps1 `
            -Installer "./installer/output/CADPhotoToDXF-${{ steps.version.outputs.value }}-Setup.exe" `
            -Sample ./samples/test.jpg `
            -WorkingDirectory "$env:RUNNER_TEMP/cad-photo-release-installer-smoke"

      - name: Prepare immutable release assets and provenance
        id: assets
        shell: pwsh
        working-directory: cad_photo_to_dxf
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = Join-Path $env:RUNNER_TEMP "release-assets"
          New-Item -ItemType Directory -Force $releaseDir | Out-Null
          $portable = Join-Path $releaseDir "CADPhotoToDXF-${{ steps.version.outputs.value }}-portable.zip"
          Compress-Archive -Path "./dist/CADPhotoToDXF/*" -DestinationPath $portable -CompressionLevel Optimal
          $installer = "./installer/output/CADPhotoToDXF-${{ steps.version.outputs.value }}-Setup.exe"
          Copy-Item $installer $releaseDir -Force
          $provenance = @{
            version = "${{ steps.version.outputs.value }}"
            tag = $env:RELEASE_TAG
            commit = "${{ steps.version.outputs.commit }}"
            workflow = $env:GITHUB_WORKFLOW
            workflow_run_id = $env:GITHUB_RUN_ID
            repository = $env:GITHUB_REPOSITORY
            python = (python --version)
            generated_at_utc = [DateTime]::UtcNow.ToString("o")
          } | ConvertTo-Json -Depth 4
          $provenance | Set-Content (Join-Path $releaseDir "provenance.json") -Encoding utf8
          $hashLines = Get-ChildItem $releaseDir -File | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          }
          $hashLines | Set-Content (Join-Path $releaseDir "SHA256SUMS.txt") -Encoding ascii
          "directory=$releaseDir" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create new GitHub Release without replacement
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $assets = Get-ChildItem "${{ steps.assets.outputs.directory }}" -File | ForEach-Object { $_.FullName }
          $arguments = @(
            "release", "create", $env:RELEASE_TAG,
            "--repo", $env:GITHUB_REPOSITORY,
            "--target", "${{ steps.version.outputs.commit }}",
            "--verify-tag",
            "--title", "CAD Photo to DXF $env:RELEASE_TAG",
            "--generate-notes"
          ) + $assets
          & gh @arguments
          if ($LASTEXITCODE -ne 0) { throw "GitHub Release creation failed" }

      - name: Upload CI artifact copy
        uses: actions/upload-artifact@v4
        with:
          name: CADPhotoToDXF-${{ steps.version.outputs.value }}-release-assets
          path: ${{ steps.assets.outputs.directory }}/*
          if-no-files-found: error
          retention-days: 14
