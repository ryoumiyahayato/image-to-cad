name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 75
    outputs:
      version: ${{ steps.version.outputs.value }}
    defaults:
      run:
        working-directory: cad_photo_to_dxf

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: cad_photo_to_dxf/requirements*.txt

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify tag matches canonical application version
        id: version
        shell: pwsh
        run: |
          $version = (python -c "from app import __version__; print(__version__)").Trim()
          $expectedTag = "v$version"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match application version $expectedTag"
          }
          "value=$version" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "VERSION=$version" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run release checks
        shell: pwsh
        run: |
          python -m pytest -q
          python -m ruff check app tests validation main.py
          python -m mypy app/resolution.py app/scale_calibrator.py app/reporting.py app/auxiliary_recognition.py
          python -m compileall -q app tests validation main.py

      - name: Build portable application
        shell: pwsh
        run: pyinstaller --noconfirm --clean cad_photo_to_dxf.spec

      - name: Smoke test portable application
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          ./scripts/windows_smoke.ps1 `
            -Executable ./dist/CADPhotoToDXF/CADPhotoToDXF.exe `
            -Sample ./samples/test.jpg `
            -WorkingDirectory "$env:RUNNER_TEMP/cad-photo-release-smoke"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:/Program Files (x86)/Inno Setup 6/ISCC.exe" `
            "/DMyAppVersion=$env:VERSION" `
            ./installer/cad_photo_to_dxf.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup build failed" }

      - name: Smoke test installer
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process Bypass -Force
          ./scripts/installer_smoke.ps1 `
            -Installer "./installer/output/CADPhotoToDXF-$env:VERSION-Setup.exe" `
            -Sample ./samples/test.jpg `
            -WorkingDirectory "$env:RUNNER_TEMP/cad-photo-release-installer-smoke"

      - name: Prepare immutable release assets
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release-assets"
          Remove-Item $releaseDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $releaseDir | Out-Null
          Compress-Archive `
            -Path ./dist/CADPhotoToDXF/* `
            -DestinationPath "$releaseDir/CADPhotoToDXF-$env:VERSION-portable.zip" `
            -CompressionLevel Optimal
          Copy-Item `
            "./installer/output/CADPhotoToDXF-$env:VERSION-Setup.exe" `
            $releaseDir
          $hashLines = Get-ChildItem $releaseDir -File | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          }
          $hashLines | Set-Content "$releaseDir/SHA256SUMS.txt" -Encoding ascii

      - name: Upload validated release assets
        uses: actions/upload-artifact@v4
        with:
          name: CADPhotoToDXF-${{ steps.version.outputs.value }}-release-assets
          if-no-files-found: error
          retention-days: 30
          path: ${{ github.workspace }}/release-assets/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production-release
    permissions:
      contents: write

    steps:
      - name: Check out exact tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Download validated release assets
        uses: actions/download-artifact@v4
        with:
          name: CADPhotoToDXF-${{ needs.build.outputs.version }}-release-assets
          path: release-assets

      - name: Refuse to overwrite an existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; refusing to overwrite it" >&2
            exit 1
          fi

      - name: Create release for exact tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' assets < <(find release-assets -maxdepth 1 -type f -print0 | sort -z)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No validated release assets found" >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --target "$GITHUB_SHA" \
            --title "CAD Photo to DXF $GITHUB_REF_NAME" \
            --generate-notes \
            "${assets[@]}"
