name: Apply local patch chunks

on:
  pull_request:
    branches:
      - main
    paths:
      - ".automation/ready"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/multipage-visual-review-fidelity
          fetch-depth: 0
          show-progress: false
      - name: Apply verified patch or persist diagnostics
        shell: bash
        run: |
          set -u
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cat .automation/patch.part-* > "$RUNNER_TEMP/multipage-fidelity.b64"
          if ! base64 --decode "$RUNNER_TEMP/multipage-fidelity.b64" > "$RUNNER_TEMP/multipage-fidelity.patch" 2> .automation/apply-error.txt; then
            rm -f .automation/ready
            git add -A
            git commit -m "ci: persist patch decode failure"
            git push origin HEAD:fix/multipage-visual-review-fidelity
            exit 1
          fi
          if ! git apply --check "$RUNNER_TEMP/multipage-fidelity.patch" > .automation/apply-error.txt 2>&1; then
            rm -f .automation/ready
            git add -A
            git commit -m "ci: persist patch validation failure"
            git push origin HEAD:fix/multipage-visual-review-fidelity
            exit 1
          fi
          git apply "$RUNNER_TEMP/multipage-fidelity.patch"
          rm -f .automation/patch.part-* .automation/ready .automation/apply-error.txt
          git add -A
          git commit -m "feat: add multi-page scan fidelity and visual review"
          git push origin HEAD:fix/multipage-visual-review-fidelity
