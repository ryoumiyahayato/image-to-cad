name: Diagnose v1.2.0 Windows packaging

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-packaging:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: build-v1.2.0

      - name: Reconstruct source
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $parts = Get-ChildItem release_payload -Filter "source.part*.b64" | Sort-Object Name
          $base64 = ($parts | ForEach-Object { Get-Content $_.FullName -Raw }) -join ""
          $archive = Join-Path $env:RUNNER_TEMP "source.tar.xz"
          [IO.File]::WriteAllBytes($archive, [Convert]::FromBase64String($base64))
          $actual = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          $expected = (Get-Content release_payload/SHA256.txt -Raw).Trim().ToLowerInvariant()
          if ($actual -ne $expected) { throw "Source hash mismatch" }
          $root = Join-Path $env:RUNNER_TEMP source
          New-Item -ItemType Directory -Force $root | Out-Null
          tar -xJf $archive -C $root
          $project = Join-Path $root release_min_src
          $spec = Join-Path $project packaging/CADPhotoToDXF.spec
          $text = Get-Content $spec -Raw
          $text = $text.Replace('ROOT = Path(SPECPATH).parent.parent', 'ROOT = Path(SPECPATH).parent')
          $text = $text.Replace('    (str(ROOT / "samples"), "samples"),' + "`r`n", "")
          $text = $text.Replace('    (str(ROOT / "samples"), "samples"),' + "`n", "")
          Set-Content $spec $text -Encoding UTF8
          "PROJECT_ROOT=$project" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies and generate icon
        shell: pwsh
        run: |
          Set-Location $env:PROJECT_ROOT
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -r requirements-build.txt
          New-Item -ItemType Directory -Force assets | Out-Null
          @'
          from PIL import Image, ImageDraw
          image = Image.new("RGBA", (256, 256), (31, 78, 121, 255))
          draw = ImageDraw.Draw(image)
          draw.rounded_rectangle((35, 24, 221, 232), radius=14, fill=(248, 249, 250, 255), outline=(255, 255, 255, 255), width=5)
          draw.line((58, 70, 198, 70), fill=(31, 78, 121, 255), width=9)
          draw.line((58, 104, 198, 104), fill=(31, 78, 121, 255), width=7)
          draw.rectangle((58, 132, 122, 198), outline=(31, 78, 121, 255), width=8)
          draw.line((148, 132, 198, 182), fill=(31, 78, 121, 255), width=8)
          draw.line((198, 132, 148, 182), fill=(31, 78, 121, 255), width=8)
          image.save("assets/app_icon.ico", format="ICO", sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])
          '@ | python -

      - name: Build PyInstaller application
        id: pyinstaller
        continue-on-error: true
        shell: pwsh
        run: |
          Set-Location $env:PROJECT_ROOT
          $log = Join-Path $env:RUNNER_TEMP "pyinstaller.log"
          & python -m PyInstaller --noconfirm --clean packaging/CADPhotoToDXF.spec *>&1 | Tee-Object -FilePath $log
          $code = $LASTEXITCODE
          if ($code -ne 0) { exit $code }
          if (-not (Test-Path dist/CADPhotoToDXF/CADPhotoToDXF.exe)) {
            "PyInstaller executable is missing" | Add-Content $log
            exit 1
          }

      - name: Upload PyInstaller diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CADPhotoToDXF-v1.2.0-pyinstaller-log
          path: ${{ runner.temp }}/pyinstaller.log
          if-no-files-found: error
          retention-days: 7

      - name: Install Inno Setup
        if: steps.pyinstaller.outcome == 'success'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found" }
          "ISCC=$iscc" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Compile Inno Setup installer
        if: steps.pyinstaller.outcome == 'success'
        shell: pwsh
        run: |
          Set-Location $env:PROJECT_ROOT
          New-Item -ItemType Directory -Force packaging/output | Out-Null
          & $env:ISCC "/DMyAppVersion=1.2.0" packaging/installer.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup returned $LASTEXITCODE" }

      - name: Create portable ZIP
        if: steps.pyinstaller.outcome == 'success'
        shell: pwsh
        run: |
          Set-Location $env:PROJECT_ROOT
          Compress-Archive -Path dist/CADPhotoToDXF/* -DestinationPath packaging/output/CADPhotoToDXF_Modern_x64_Portable_v1.2.0.zip -CompressionLevel Optimal

      - name: Upload diagnostic build products
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CADPhotoToDXF-v1.2.0-diagnostic-products
          path: ${{ runner.temp }}/source/release_min_src/packaging/output/*
          if-no-files-found: warn
          retention-days: 7

      - name: Fail when PyInstaller failed
        if: steps.pyinstaller.outcome == 'failure'
        shell: pwsh
        run: exit 1
