name: Validate main source

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: cad_photo_to_dxf

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip 2>&1 | Tee-Object -FilePath validation-setup.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          pip install -r requirements.txt "pytest>=8,<9" "ruff>=0.9,<1" 2>&1 | Tee-Object -FilePath validation-setup.txt -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run tests
        shell: pwsh
        run: |
          python -m pytest -q 2>&1 | Tee-Object -FilePath validation-pytest.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run static checks
        shell: pwsh
        run: |
          python -m compileall -q app main.py 2>&1 | Tee-Object -FilePath validation-compile.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m ruff check . 2>&1 | Tee-Object -FilePath validation-ruff.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-diagnostics
          path: |
            cad_photo_to_dxf/validation-setup.txt
            cad_photo_to_dxf/validation-pytest.txt
            cad_photo_to_dxf/validation-compile.txt
            cad_photo_to_dxf/validation-ruff.txt
          if-no-files-found: warn
          retention-days: 7
