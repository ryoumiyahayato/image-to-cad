name: Publish v1.2.0

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 120

    env:
      VERSION: "1.2.0"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set project root
        shell: pwsh
        run: |
          "PROJECT_ROOT=$env:GITHUB_WORKSPACE" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and restore generated icon
        shell: pwsh
        run: |
          Set-Location $env:PROJECT_ROOT

          python -m pip install --upgrade pip

          pip install -r requirements-dev.txt -r requirements-build.txt

          New-Item -ItemType Directory -Force assets | Out-Null

          @'
          from pathlib import Path
          from PIL import Image, ImageDraw

          canvas = Image.new("RGBA", (256, 256), (31, 78, 121, 255))
          draw = ImageDraw.Draw(canvas)

          draw.rounded_rectangle(
              (35, 24, 221, 232),
              radius=14,
              fill=(248, 249, 250, 255),
              outline=(255, 255, 255, 255),
              width=5
          )

          draw.line((58,70,198,70), fill=(31,78,121,255), width=9)
          draw.line((58,104,198,104), fill=(31,78,121,255), width=7)
          draw.rectangle((58,132,122,198), outline=(31,78,121,255), width=8)
          draw.line((148,132,198,182), fill=(31,78,121,255), width=8)
          draw.line((198,132,148,182), fill=(31,78,121,255), width=8)

          output = Path("assets/app_icon.ico")

          canvas.save(
              output,
              format="ICO",
              sizes=[
                  (16,16),
                  (24,24),
                  (32,32),
                  (48,48),
                  (64,64),
                  (128,128),
                  (256,256)
              ]
          )

          print(f"Generated {output}")
          '@ | python -

      - name: Run regression and static checks
        shell: pwsh
        run: |
          Set-Location $env:PROJECT_ROOT

          python -m pytest -q

          python -m ruff check .

          python -m compileall -q app legacy main.py

      - name: Build Modern x64 installer and portable package
        shell: pwsh
        run: |
          Set-Location $env:PROJECT_ROOT

          .\packaging\build_windows.ps1 -SkipTests

      - name: Prepare release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $releaseDir = Join-Path $env:TEMP "release-assets"

          New-Item -ItemType Directory -Force $releaseDir | Out-Null

          Copy-Item "$env:PROJECT_ROOT/packaging/output/*" $releaseDir -Force

          Compress-Archive `
            -Path "$env:PROJECT_ROOT/*" `
            -DestinationPath "$releaseDir/cad_photo_to_dxf_source_v1.2.0.zip" `
            -CompressionLevel Optimal

          if (Test-Path "$env:PROJECT_ROOT/legacy") {
            Compress-Archive `
              -Path "$env:PROJECT_ROOT/legacy/*" `
              -DestinationPath "$releaseDir/cad_photo_to_dxf_legacy_source_v1.2.0.zip" `
              -CompressionLevel Optimal
          }

          foreach ($doc in @(
            "README.md",
            "COMPATIBILITY_MATRIX.md",
            "WINDOWS_LEGACY_ADAPTATION_AUDIT_v1.2.0.md",
            "SECURITY_AUDIT.md",
            "CHANGELOG.md"
          )) {
            if (Test-Path "$env:PROJECT_ROOT/$doc") {
              Copy-Item "$env:PROJECT_ROOT/$doc" $releaseDir -Force
            }
          }

          $hashFile = Join-Path $releaseDir "SHA256SUMS.txt"

          $lines = Get-ChildItem $releaseDir -File |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            }

          $lines | Set-Content $hashFile -Encoding ascii

          "RELEASE_DIR=$releaseDir" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create GitHub Release v1.2.0
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}

        run: |
          $ErrorActionPreference = "Stop"

          gh release view "v$env:VERSION" --repo $env:GITHUB_REPOSITORY *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release delete "v$env:VERSION" `
              --repo $env:GITHUB_REPOSITORY `
              --yes `
              --cleanup-tag
          }

          $assets = Get-ChildItem $env:RELEASE_DIR -File |
            ForEach-Object { $_.FullName }

          gh release create "v$env:VERSION" `
            --repo $env:GITHUB_REPOSITORY `
            --title "CAD Photo to DXF v$env:VERSION" `
            --notes "Release v$env:VERSION" `
            $assets

      - name: Upload CI artifact copy
        uses: actions/upload-artifact@v4
        with:
          name: CADPhotoToDXF-v1.2.0-release-assets
          path: ${{ env.RELEASE_DIR }}/*
          if-no-files-found: error
          retention-days: 30