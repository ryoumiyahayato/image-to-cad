name: Validate main source

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v4

      - name: Initialize diagnostics
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force validation-diagnostics | Out-Null
          "workspace=$env:GITHUB_WORKSPACE" | Set-Content validation-diagnostics/start.txt
          "project_exists=$(Test-Path cad_photo_to_dxf)" | Add-Content validation-diagnostics/start.txt
          Get-ChildItem -Force | Select-Object Name, Length | Out-String | Add-Content validation-diagnostics/start.txt

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        shell: pwsh
        run: |
          Set-Location cad_photo_to_dxf
          python -m pip install --upgrade pip 2>&1 | Tee-Object -FilePath ../validation-diagnostics/setup.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          pip install -r requirements.txt "pytest>=8,<9" "ruff>=0.9,<1" 2>&1 | Tee-Object -FilePath ../validation-diagnostics/setup.txt -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run tests
        shell: pwsh
        run: |
          Set-Location cad_photo_to_dxf
          python -m pytest -q 2>&1 | Tee-Object -FilePath ../validation-diagnostics/pytest.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run static checks
        shell: pwsh
        run: |
          Set-Location cad_photo_to_dxf
          python -m compileall -q app main.py 2>&1 | Tee-Object -FilePath ../validation-diagnostics/compile.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m ruff check . 2>&1 | Tee-Object -FilePath ../validation-diagnostics/ruff.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-diagnostics
          path: validation-diagnostics/*
          if-no-files-found: error
          retention-days: 7
