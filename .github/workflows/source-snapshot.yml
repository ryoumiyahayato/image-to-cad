name: Source snapshot

on:
  pull_request:
    paths:
      - ".github/workflows/source-snapshot.yml"

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: image-to-cad-source
          path: |
            .github
            cad_photo_to_dxf
            AGENTS.md
            README.md
          if-no-files-found: error
          retention-days: 2
