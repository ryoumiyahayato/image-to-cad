name: Apply local patch

on:
  push:
    branches:
      - fix/multipage-visual-review-fidelity
    paths:
      - ".automation/multipage-fidelity.patch"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/multipage-visual-review-fidelity
          fetch-depth: 0
      - name: Apply verified patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .automation/multipage-fidelity.patch
          git apply .automation/multipage-fidelity.patch
          rm .automation/multipage-fidelity.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add multi-page scan fidelity and visual review"
          git push origin HEAD:fix/multipage-visual-review-fidelity
